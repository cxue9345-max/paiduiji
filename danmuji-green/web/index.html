<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDJ Go 弹幕流</title>
  <style>
    body{font-family:Arial,sans-serif;margin:20px;background:#0f172a;color:#e2e8f0}
    input,button{padding:8px;border-radius:6px;border:none}
    input{width:180px;margin-right:8px}
    button{background:#22c55e;color:#04130b;cursor:pointer}
    #status{margin:10px 0;color:#7dd3fc}
    #list{max-height:70vh;overflow:auto;background:#111827;padding:10px;border-radius:8px}
    .item{padding:6px 0;border-bottom:1px solid #1f2937}
    .meta{font-size:12px;color:#94a3b8}
  </style>
</head>
<body>
  <h2>Go + JavaScript 弹幕流（替代 danmuji-green）</h2>
  <div>
    <input id="roomid" placeholder="roomid" />
    <input id="uid" placeholder="uid(可选)" />
    <input id="cookie" placeholder="cookie(可选)" />
    <button id="save">保存并重连</button>
  </div>
  <div id="status">状态：初始化中</div>
  <div id="list"></div>
  <script src="app.js"></script>
</body>
</html>
